<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daftar - Meta Automation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0668e0",
                "background-light": "#f5f7f8",
                "background-dark": "#0f1823",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header / Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined text-2xl">donut_large</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Meta Automation</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 px-4 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">help_outline</span>
</button>
</header>
<!-- Main Content Container -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="layout-content-container flex flex-col w-full max-w-[480px] bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<!-- Title Section -->
<div class="flex flex-col gap-2 mb-8 text-center">
<h1 class="text-slate-900 dark:text-white text-3xl font-black leading-tight tracking-tight">Daftar Akun Baru</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Silakan lengkapi formulir di bawah ini untuk memulai otomatisasi Anda.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5">
<!-- Full Name -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Nama Lengkap</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-12 pl-12 pr-4 text-base transition-all" placeholder="Masukkan nama lengkap Anda" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-12 pl-12 pr-4 text-base transition-all" placeholder="contoh@email.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Password</label>
<div class="relative flex">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-12 pl-12 pr-12 text-base transition-all" placeholder="Masukkan password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col w-full">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold mb-2">Konfirmasi Password</label>
<div class="relative flex">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock_reset</span>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-12 pl-12 pr-12 text-base transition-all" placeholder="Ulangi password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 flex w-full items-center justify-center rounded-lg bg-primary text-white h-12 font-bold text-lg hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20" type="submit">
                            Daftar Sekarang
                        </button>
</form>
<!-- Login Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                            Sudah punya akun? 
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Masuk di sini</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-6 text-center text-slate-500 dark:text-slate-500 text-sm">
                © 2024 Meta Automation. Hak Cipta Dilindungi.
            </footer>
</div>
</div>
</body></html>
