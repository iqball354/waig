<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0668e0",
                "background-light": "#f5f7f8",
                "background-dark": "#0f1823",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Login - Meta Automation</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Background Decoration -->
<div class="absolute inset-0 overflow-hidden -z-10">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-3xl"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-primary/10 overflow-hidden">
<div class="p-8">
<!-- Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-4xl">settings_input_component</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Meta Automation</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-sm">Silakan masuk untuk mengelola sistem Anda</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">Alamat Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-white" id="email" name="email" placeholder="nama@perusahaan.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Kata Sandi</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-white" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-colors cursor-pointer bg-white dark:bg-slate-800" id="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">Ingat saya di perangkat ini</label>
</div>
<!-- Login Button -->
<button class="w-full flex items-center justify-center px-6 py-3 border border-transparent text-base font-bold rounded-lg text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-lg shadow-primary/20" type="submit">
<span class="mr-2 material-symbols-outlined text-lg">login</span>
                    Login Meta
                </button>
</form>
<!-- Social/Divider -->
<div class="mt-8 relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-500">Atau masuk dengan</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg text-blue-600">account_circle</span>
                    Google
                </button>
<button class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg text-slate-900 dark:text-white">hub</span>
                    GitHub
                </button>
</div>
<!-- Register Link -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Belum memiliki akun? 
                    <a class="font-bold text-primary hover:underline ml-1" href="#">Daftar sekarang</a>
</p>
</div>
</div>
<!-- Card Footer -->
<div class="bg-slate-50 dark:bg-slate-800/50 px-8 py-4 border-t border-slate-100 dark:border-slate-800 flex justify-center gap-4">
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-400 hover:text-primary transition-colors" href="#">Bantuan</a>
<span class="text-slate-300 dark:text-slate-700">•</span>
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-400 hover:text-primary transition-colors" href="#">Privasi</a>
<span class="text-slate-300 dark:text-slate-700">•</span>
<a class="text-[10px] uppercase tracking-widest font-bold text-slate-400 hover:text-primary transition-colors" href="#">Syarat</a>
</div>
</div>
<!-- Footer Credit -->
<div class="mt-8 text-slate-400 dark:text-slate-600 text-xs text-center">
        © 2024 Meta Automation System. Seluruh hak cipta dilindungi.
    </div>
</div>
</body></html>
